name: Publish Quarto site

# Renders the Quarto website and deploys it via the official GitHub Pages
# deployment (no gh-pages branch needed). Requires Pages source = "GitHub Actions"
# (repo Settings > Pages) or read-write workflow permissions.
on:
  push:
    branches: [main]
    paths:
      - "index.qmd"
      - "_quarto.yml"
      - "**/*.md"
      - "**/*.ipynb"
      - ".github/workflows/publish-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable, source = GitHub Actions)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Jupyter (render .ipynb from stored outputs; no execution)
        run: pip install jupyter

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
