    - llm/finetuning_methods_survey.md

# Never run kernels in CI — .md files carry plain code fences, and any notebooks use
# their stored outputs. Keeps the GitHub Actions build fast and dependency-free.
execute:
  enabled: false

website:
  title: "ML & Autonomous Driving Notes"
  description: "Deep-dive technical reports on machine learning and autonomous-driving systems."
  site-url: "https://morimori0456.github.io/ML_report/"
  repo-url: "https://github.com/morimori0456/ML_report"
  repo-actions: [source, issue]
  reader-mode: true
  navbar:
