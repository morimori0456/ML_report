  # Discussion layer: giscus is backed by this repo's GitHub Discussions.
  # ACTION REQUIRED before this works: (1) enable Discussions on the repo,
  # (2) install the giscus GitHub App (https://giscus.app), (3) confirm the
  # category below exists (create an "Announcements"/"General" discussion category).
  comments:
    giscus:
      repo: morimori0456/ML_report
      repo-id: R_kgDOSo8AoA
      category: General
      category-id: DIC_kwDOSo8AoM4DBHF-
      mapping: pathname
      reactions-enabled: true
      input-position: bottom
      language: en
      loading: lazy

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    toc-expand: true
    code-copy: true
    code-overflow: wrap
    html-math-method: katex
    link-external-newwindow: true
    link-external-icon: true
